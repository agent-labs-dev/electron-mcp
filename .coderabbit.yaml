# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit configuration.
#
# Repo-level overrides on top of the dashboard defaults. Anything not
# set here inherits from the org-level config in the CodeRabbit
# dashboard.
#
# Docs: https://docs.coderabbit.ai/reference/yaml-template

# Inherit unspecified keys from the org-level CodeRabbit dashboard.
# Schema default is `false` (fall through to built-in defaults instead),
# so this must be set explicitly for the header comment above to hold.
# Docs: https://docs.coderabbit.ai/configuration/configuration-inheritance
inheritance: true

language: en-US

reviews:
  # ──────────────────────────────────────────────────────────────────
  # Tone
  # ──────────────────────────────────────────────────────────────────
  # `chill` keeps nitpick density low — appropriate for an early-stage
  # repo where churn is high and codified conventions are thin. Switch
  # to `assertive` once we have a stable surface area worth tightening.
  profile: chill
  # Post a commit status ("pending" while reviewing, "success" when
  # complete) under the `CodeRabbit` context. Default is `true` but
  # the org-level dashboard can flip it — pinning here so the repo
  # state is self-describing, and so agents watching `gh pr checks`
  # can always see whether CR is mid-review.
  commit_status: true
  # Post a formal "Request changes" review when CR has unresolved
  # actionable feedback, and auto-approve once those comments are
  # resolved. Combined with `required_approving_review_count: 1` on
  # the `main` ruleset, this turns CR's feedback into a real merge
  # gate — agents can't squash-merge past unaddressed CR comments
  # without an explicit human dismissal of the review.
  request_changes_workflow: true
  # Cosmetic; not earning its keep in PR descriptions.
  poem: false

  # ──────────────────────────────────────────────────────────────────
  # Stacked PRs
  # ──────────────────────────────────────────────────────────────────
  # By default CodeRabbit only reviews PRs targeting the repository's
  # default branch (`main`). Stacked PRs — where PR #2 targets the
  # branch from PR #1 instead of `main` — get silently skipped under
  # that default. `.*` opts every non-default branch in, so any
  # stacked PR (regardless of parent branch name) gets the same
  # treatment as a top-of-stack PR.
  #
  # Note: `base_branches` lives under `auto_review` only — the schema
  # has no top-level `reviews.base_branches`, despite what some
  # third-party docs suggest.
  auto_review:
    enabled: true
    base_branches:
      - ".*"
    # Default is 5 — CR auto-pauses reviews on a branch after that many
    # commits land since the last pause, on the theory that a flurry of
    # commits means the branch is churning and review noise will pile
    # up. In an agent-driven workflow that threshold trips constantly
    # (a single planning iteration easily produces 5+ commits), and a
    # paused review is worse than a slightly noisy one — we lose the
    # signal entirely. `0` disables the pause; CR keeps reviewing every
    # incremental push.
    auto_pause_after_reviewed_commits: 0

  # ──────────────────────────────────────────────────────────────────
  # Path filters
  # ──────────────────────────────────────────────────────────────────
  # Exclude generated / mechanical files. Reviewing them surfaces no
  # actionable feedback and burns token budget. `!` prefix excludes.
  path_filters:
    # Lockfile churn — review the package.json delta, not the
    # resolved-deps JSON.
    - "!pnpm-lock.yaml"
    # Build output. `dist/` is regenerated by `pnpm build` and isn't
    # checked in for production paths, but is consumed by the smoke
    # test fixture — review the source under `src/`, not the artifact.
    - "!dist/**"

  # ──────────────────────────────────────────────────────────────────
  # Path-specific instructions
  # ──────────────────────────────────────────────────────────────────
  # Encode this package's load-bearing invariants so CR enforces them
  # in review rather than relying on every reviewer remembering.
  path_instructions:
    - path: "src/cdp.ts"
      instructions: |
        Per-surface CDP attachment cache. Two invariants:
          1. Every cache mutation (`attached.set`, `attached.delete`)
             must be guarded by `rec.win.webContents === wc` so a
             stale `CdpSession` handle from a previous binding can't
             clobber the entry that belongs to the current window.
          2. Each `wc.debugger.on("detach", …)` listener must
             self-unregister via `wc.debugger.off(...)` inside the
             callback before any cache mutation, or attach/detach
             cycles accumulate listeners.

        Flag any new code path that mutates `attached` without the
        binding-equality check.

    - path: "src/server.ts"
      instructions: |
        Streamable HTTP transport on `127.0.0.1` only. Reject any
        change that allows binding a non-loopback host, or that
        removes the `shuttingDown` latch / 503 reject path in
        `routeRequest` — without it, an `initialize` racing `stop()`
        leaves a session minted after the snapshot and stalls
        `httpServer.close()` indefinitely.

        Any new `res.end(...)` followed by a synchronous
        `socket.destroy()` should pair the destroy as the `res.end`
        callback — destroying mid-flush surfaces as ECONNRESET on
        the client.

    - path: "src/tools/**"
      instructions: |
        MCP tool factories. Each tool registers via
        `server.registerTool(name, config, handler)` and resolves a
        surface through `getOrAttachSession(getSurfaces, surface)`.
        Direct `webContents.debugger.attach()` calls are a smell —
        attachment must go through `getOrAttachSession` so the cache
        and listener bookkeeping stay correct. Every tool's
        `inputSchema` must accept a `surface: string` (no implicit
        default surface) so the tool composes against arbitrary
        consumer-provided surface namespaces.

    - path: "tests/fixtures/**"
      instructions: |
        Fixture Electron mini-apps for Playwright `_electron` tests.
        Stay CommonJS — Electron 41 only enters main-process mode
        when it can resolve `package.json#main` against a CJS entry,
        and the parent's `"type": "module"` fights `require`-based
        entries. Dynamic `import()` of dist output must use
        `pathToFileURL().href` to stay portable to Windows.

  # ──────────────────────────────────────────────────────────────────
  # Tool integrations
  # ──────────────────────────────────────────────────────────────────
  # Run as part of the review and surface findings inline. Every tool
  # in the CR catalogue defaults to `enabled: true`, so anything we
  # want OFF must be set explicitly — omitting the block is NOT the
  # same as disabling.
  tools:
    # Secret scanning — cheap insurance against an accidental
    # paste-into-fixture or hardcoded test credential.
    gitleaks:
      enabled: true
    # GitHub Actions linting. No-op until we land workflows here, but
    # pinned on so the first PR adding `.github/workflows/*.yml` gets
    # caught before merging a misconfigured trigger.
    actionlint:
      enabled: true
